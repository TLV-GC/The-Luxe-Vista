<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Luxe Vista — Style in Luxury. Walk in Elegance.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dark: #9a7a2e;
      --obsidian: #0a0a0a;
      --charcoal: #141414;
      --slate: #1e1e1e;
      --smoke: #2a2a2a;
      --silver: #b0b0b0;
      --cream: #f5f0e8;
      --white: #ffffff;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Montserrat', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--obsidian);
      color: var(--cream);
      font-family: var(--font-sans);
      font-weight: 300;
      overflow-x: hidden;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      width: 10px; height: 10px;
      background: var(--gold);
      border-radius: 50%;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      transition: transform 0.15s ease;
      transform: translate(-50%, -50%);
    }
    .cursor-ring {
      width: 36px; height: 36px;
      border: 1px solid rgba(201,168,76,0.5);
      border-radius: 50%;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9998;
      transition: transform 0.35s ease, width 0.3s, height 0.3s;
      transform: translate(-50%, -50%);
    }
    .cursor-ring.hover { width: 56px; height: 56px; border-color: var(--gold); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--obsidian); }
    ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }

    /* ──────────────────── NAV ──────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 1000;
      padding: 24px 60px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background 0.4s, padding 0.4s;
    }
    nav.scrolled {
      background: rgba(10,10,10,0.96);
      backdrop-filter: blur(12px);
      padding: 16px 60px;
      border-bottom: 1px solid rgba(201,168,76,0.15);
    }
    .nav-logo {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--gold);
      text-decoration: none;
    }
    .nav-logo span { font-weight: 300; color: var(--cream); }
    .nav-links { display: flex; gap: 40px; list-style: none; }
    .nav-links a {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--silver);
      text-decoration: none;
      position: relative;
      transition: color 0.3s;
    }
    .nav-links a::after {
      content: '';
      position: absolute; bottom: -4px; left: 0; right: 0;
      height: 1px; background: var(--gold);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.35s ease;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-links a:hover::after { transform: scaleX(1); }
    .nav-cta {
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      border: 1px solid var(--gold); color: var(--gold);
      padding: 10px 24px; text-decoration: none;
      transition: background 0.3s, color 0.3s;
    }
    .nav-cta:hover { background: var(--gold); color: var(--obsidian); }

    /* Mobile nav toggle */
    .nav-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
    .nav-toggle span { display: block; width: 24px; height: 1px; background: var(--gold); transition: 0.3s; }

    /* ──────────────────── HERO ──────────────────── */
    .hero {
      height: 100vh; min-height: 700px;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      background: var(--obsidian);
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 60% 40%, rgba(201,168,76,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 60%);
    }
    .hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 70%);
    }
    .hero-content {
      position: relative; z-index: 2;
      text-align: center; max-width: 900px; padding: 0 24px;
    }
    .hero-eyebrow {
      font-size: 0.62rem; letter-spacing: 0.4em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 28px;
      opacity: 0; animation: fadeUp 1s 0.2s forwards;
    }
    .hero-title {
      font-family: var(--font-serif);
      font-size: clamp(3.2rem, 8vw, 7rem);
      font-weight: 300; line-height: 1.05;
      letter-spacing: 0.02em; color: var(--white);
      margin-bottom: 32px;
      opacity: 0; animation: fadeUp 1s 0.5s forwards;
    }
    .hero-title em { font-style: italic; color: var(--gold); }
    .hero-tagline {
      font-size: 0.75rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--silver);
      margin-bottom: 56px;
      opacity: 0; animation: fadeUp 1s 0.8s forwards;
    }
    .hero-actions {
      display: flex; gap: 20px; justify-content: center; align-items: center;
      opacity: 0; animation: fadeUp 1s 1.1s forwards;
    }
    .btn-primary {
      display: inline-block;
      background: var(--gold);
      color: var(--obsidian);
      font-size: 0.62rem; letter-spacing: 0.25em;
      text-transform: uppercase; font-weight: 600;
      padding: 16px 40px; text-decoration: none;
      transition: background 0.3s, transform 0.2s;
    }
    .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }
    .btn-ghost {
      display: inline-block;
      border: 1px solid rgba(201,168,76,0.5);
      color: var(--cream);
      font-size: 0.62rem; letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 16px 40px; text-decoration: none;
      transition: border-color 0.3s, color 0.3s;
    }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .hero-line {
      position: absolute; bottom: 48px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      opacity: 0; animation: fadeUp 1s 1.4s forwards;
    }
    .hero-line span { font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--silver); }
    .scroll-line { width: 1px; height: 50px; background: linear-gradient(to bottom, var(--gold), transparent); animation: scrollPulse 2s infinite; }

    /* ──────────────────── MARQUEE ──────────────────── */
    .marquee-bar {
      border-top: 1px solid rgba(201,168,76,0.2);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      background: var(--charcoal);
      padding: 14px 0; overflow: hidden;
    }
    .marquee-track {
      display: flex; gap: 60px;
      width: max-content;
      animation: marquee 28s linear infinite;
    }
    .marquee-item {
      font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--silver); white-space: nowrap;
      display: flex; align-items: center; gap: 24px;
    }
    .marquee-item::after { content: '✦'; color: var(--gold); font-size: 0.5rem; }

    /* ──────────────────── ABOUT ──────────────────── */
    .section { padding: 120px 60px; }
    .section-label {
      font-size: 0.58rem; letter-spacing: 0.4em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 20px;
    }
    .about-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 100px; align-items: center;
    }
    .about-text h2 {
      font-family: var(--font-serif);
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 300; line-height: 1.15;
      color: var(--white); margin-bottom: 32px;
    }
    .about-text h2 em { font-style: italic; color: var(--gold); }
    .about-text p {
      font-size: 0.85rem; line-height: 2;
      color: var(--silver); margin-bottom: 24px;
    }
    .about-stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 2px; margin-top: 48px;
    }
    .stat-box {
      background: var(--slate);
      padding: 32px; border: 1px solid rgba(201,168,76,0.1);
    }
    .stat-box .num {
      font-family: var(--font-serif);
      font-size: 3rem; font-weight: 300;
      color: var(--gold); line-height: 1;
    }
    .stat-box .label {
      font-size: 0.6rem; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--silver);
      margin-top: 8px;
    }
    .about-visual {
      position: relative;
    }
    .about-card {
      background: var(--slate);
      border: 1px solid rgba(201,168,76,0.15);
      padding: 60px 48px;
      position: relative; overflow: hidden;
    }
    .about-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .about-card-quote {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 3vw, 2.8rem);
      font-style: italic; font-weight: 300;
      color: var(--white); line-height: 1.4;
      margin-bottom: 32px;
    }
    .about-card-quote span { color: var(--gold); }
    .about-card-sig {
      font-size: 0.62rem; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--gold);
      padding-top: 24px;
      border-top: 1px solid rgba(201,168,76,0.2);
    }
    .about-accent {
      position: absolute; right: -30px; bottom: -30px;
      width: 140px; height: 140px;
      border: 1px solid rgba(201,168,76,0.1);
      border-radius: 50%;
    }
    .about-accent-2 {
      position: absolute; right: 10px; bottom: 10px;
      width: 80px; height: 80px;
      border: 1px solid rgba(201,168,76,0.08);
      border-radius: 50%;
    }

    /* ──────────────────── PRODUCTS ──────────────────── */
    .products-section { background: var(--charcoal); padding: 120px 60px; }
    .section-header { text-align: center; margin-bottom: 80px; }
    .section-header h2 {
      font-family: var(--font-serif);
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 300; color: var(--white);
    }
    .section-header h2 em { font-style: italic; color: var(--gold); }
    .section-header p {
      font-size: 0.8rem; color: var(--silver);
      letter-spacing: 0.1em; margin-top: 16px;
    }
    .products-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 2px;
    }
    .product-card {
      background: var(--slate);
      border: 1px solid rgba(201,168,76,0.08);
      padding: 56px 40px;
      position: relative; overflow: hidden;
      transition: border-color 0.4s, transform 0.3s;
      cursor: pointer;
    }
    .product-card::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 0;
      background: linear-gradient(to top, rgba(201,168,76,0.06), transparent);
      transition: height 0.4s;
    }
    .product-card:hover { border-color: rgba(201,168,76,0.4); transform: translateY(-6px); }
    .product-card:hover::after { height: 100%; }
    .product-icon {
      font-size: 2.5rem; margin-bottom: 32px;
      filter: grayscale(100%) brightness(150%);
      transition: filter 0.4s;
    }
    .product-card:hover .product-icon { filter: none; }
    .product-card h3 {
      font-family: var(--font-serif);
      font-size: 1.9rem; font-weight: 300;
      color: var(--white); margin-bottom: 16px; line-height: 1.2;
    }
    .product-card p {
      font-size: 0.78rem; line-height: 1.9;
      color: var(--silver); margin-bottom: 36px;
    }
    .product-tag {
      display: inline-block;
      font-size: 0.55rem; letter-spacing: 0.3em;
      text-transform: uppercase;
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold); padding: 6px 16px;
    }
    .product-number {
      position: absolute; top: 32px; right: 32px;
      font-family: var(--font-serif);
      font-size: 4rem; font-weight: 300;
      color: rgba(201,168,76,0.06);
      line-height: 1;
    }

    /* ──────────────────── WHY US ──────────────────── */
    .why-section { padding: 120px 60px; }
    .why-grid { display: grid; grid-template-columns: 1fr 1.6fr; gap: 80px; align-items: start; }
    .why-left h2 {
      font-family: var(--font-serif);
      font-size: clamp(2.4rem, 4vw, 3.6rem);
      font-weight: 300; color: var(--white);
      line-height: 1.2; position: sticky; top: 120px;
    }
    .why-left h2 em { display: block; font-style: italic; color: var(--gold); }
    .why-items { display: flex; flex-direction: column; gap: 2px; }
    .why-item {
      background: var(--slate);
      border: 1px solid rgba(201,168,76,0.08);
      padding: 36px 40px;
      display: grid; grid-template-columns: 48px 1fr;
      gap: 24px; align-items: start;
      transition: border-color 0.3s, background 0.3s;
    }
    .why-item:hover { border-color: rgba(201,168,76,0.3); background: var(--smoke); }
    .why-num {
      font-family: var(--font-serif);
      font-size: 1.4rem; font-weight: 300; color: var(--gold);
      padding-top: 2px;
    }
    .why-item h4 {
      font-size: 0.65rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--cream);
      margin-bottom: 10px;
    }
    .why-item p { font-size: 0.78rem; line-height: 1.8; color: var(--silver); }

    /* ──────────────────── MARKET ──────────────────── */
    .market-section { background: var(--charcoal); padding: 100px 60px; }
    .market-inner {
      display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
    }
    .market-visual {
      position: relative; padding: 60px;
      background: var(--slate); border: 1px solid rgba(201,168,76,0.12);
    }
    .market-visual::before {
      content: '';
      position: absolute; top: -1px; left: 40px; right: 40px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .market-rings {
      position: relative; width: 240px; height: 240px; margin: 0 auto;
    }
    .ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.2);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    .ring:nth-child(1) { width: 80px; height: 80px; background: rgba(201,168,76,0.15); border-color: var(--gold); }
    .ring:nth-child(2) { width: 150px; height: 150px; }
    .ring:nth-child(3) { width: 220px; height: 220px; animation: rotateSlow 20s linear infinite; }
    .ring-dot { position: absolute; width: 6px; height: 6px; background: var(--gold); border-radius: 50%; top: -3px; left: 50%; transform: translateX(-50%); }
    .ring-label {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center;
    }
    .ring-label span {
      font-family: var(--font-serif); font-size: 1rem; color: var(--gold); display: block;
    }
    .ring-label small {
      font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--silver);
    }
    .market-tags {
      display: flex; flex-wrap: wrap; gap: 8px; margin-top: 32px;
    }
    .market-tag {
      font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase;
      background: var(--smoke); border: 1px solid rgba(201,168,76,0.2);
      color: var(--silver); padding: 7px 16px;
    }
    .market-content h2 {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 300; color: var(--white);
      line-height: 1.2; margin-bottom: 24px;
    }
    .market-content h2 em { font-style: italic; color: var(--gold); }
    .market-content p { font-size: 0.82rem; line-height: 2; color: var(--silver); margin-bottom: 20px; }
    .geo-list { list-style: none; margin-top: 32px; }
    .geo-list li {
      display: flex; align-items: center; gap: 16px;
      font-size: 0.78rem; color: var(--silver);
      padding: 16px 0; border-bottom: 1px solid rgba(201,168,76,0.1);
    }
    .geo-list li:first-child { border-top: 1px solid rgba(201,168,76,0.1); }
    .geo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
    .geo-list strong { color: var(--cream); font-weight: 500; }

    /* ──────────────────── CTA ──────────────────── */
    .cta-section {
      padding: 140px 60px;
      background: var(--obsidian);
      position: relative; overflow: hidden; text-align: center;
    }
    .cta-section::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 70% at 50% 50%, rgba(201,168,76,0.08) 0%, transparent 70%);
    }
    .cta-inner { position: relative; z-index: 2; max-width: 700px; margin: 0 auto; }
    .cta-eyebrow {
      font-size: 0.6rem; letter-spacing: 0.4em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 24px;
    }
    .cta-inner h2 {
      font-family: var(--font-serif);
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 300; color: var(--white);
      line-height: 1.1; margin-bottom: 20px;
    }
    .cta-inner h2 em { font-style: italic; color: var(--gold); }
    .cta-inner p { font-size: 0.82rem; color: var(--silver); margin-bottom: 48px; line-height: 1.9; }
    .cta-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .btn-whatsapp {
      display: inline-flex; align-items: center; gap: 10px;
      background: #25d366; color: var(--white);
      font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 600;
      padding: 16px 36px; text-decoration: none;
      transition: background 0.3s, transform 0.2s;
    }
    .btn-whatsapp:hover { background: #1fb855; transform: translateY(-2px); }
    .contact-cards {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 2px; max-width: 560px; margin: 56px auto 0;
    }
    .contact-card {
      background: var(--slate); border: 1px solid rgba(201,168,76,0.1);
      padding: 32px; text-align: left;
    }
    .contact-card-label {
      font-size: 0.55rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 12px;
    }
    .contact-card-val { font-size: 0.88rem; color: var(--cream); font-weight: 400; }

    /* ──────────────────── FOOTER ──────────────────── */
    footer {
      background: var(--charcoal);
      border-top: 1px solid rgba(201,168,76,0.15);
      padding: 60px 60px 40px;
    }
    .footer-inner {
      display: grid; grid-template-columns: 1.4fr 1fr 1fr;
      gap: 60px; margin-bottom: 60px;
    }
    .footer-brand .logo {
      font-family: var(--font-serif);
      font-size: 1.6rem; font-weight: 600; color: var(--gold);
      display: block; margin-bottom: 16px;
    }
    .footer-brand .logo span { font-weight: 300; color: var(--cream); }
    .footer-brand p { font-size: 0.76rem; line-height: 1.9; color: var(--silver); max-width: 300px; }
    .footer-brand .tagline {
      font-family: var(--font-serif); font-style: italic;
      font-size: 0.9rem; color: var(--gold);
      margin-top: 20px; display: block;
    }
    .footer-col h5 {
      font-size: 0.58rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 20px;
    }
    .footer-col ul { list-style: none; }
    .footer-col li
